# =============================================================================
# CI/CD Pipeline — ChargePoint Claims Agent → Vercel
# =============================================================================
#
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions → New):
#
#   VERCEL_TOKEN      — Vercel account token
#                       vercel.com → Settings → Tokens → Create
#
#   VERCEL_ORG_ID     — vercel.com → Settings → General → Your ID
#                       Or run locally: npx vercel link  (writes .vercel/project.json)
#
#   VERCEL_PROJECT_ID — vercel.com → Project → Settings → General
#                       Or read from .vercel/project.json after linking
#
# OPENAI_API_KEY must be set in the Vercel dashboard (not here):
#   vercel.com → Project → Settings → Environment Variables → Add
# =============================================================================

name: CI/CD — Build & Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint — runs on every push and every PR
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on app/
        run: ruff check app/ --ignore E501

  # ---------------------------------------------------------------------------
  # Job 2: Deploy — only when lint passes AND push is to main
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
