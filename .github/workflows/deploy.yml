# =============================================================================
# CI/CD Pipeline — ChargePoint Claims Agent → GCP Cloud Run
# =============================================================================
#
# REQUIRED GITHUB SECRETS  (Settings → Secrets and variables → Actions → New):
#
#   GCP_PROJECT_ID   — GCP project ID shown in the Console top bar
#                      e.g.  my-project-123456
#
#   GCP_SA_KEY       — Service Account JSON key (paste the raw JSON, not base64)
#                      The SA needs these roles:
#                        - roles/run.admin
#                        - roles/artifactregistry.writer
#                        - roles/iam.serviceAccountUser
#
#   OPENAI_API_KEY   — Your OpenAI key (sk-...)
#
# ONE-TIME GCP SETUP (run once in Cloud Shell or gcloud CLI):
#   gcloud artifacts repositories create claims-agent \
#     --repository-format=docker --location=us-central1
# =============================================================================

name: CI/CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION:    us-central1
  SERVICE_NAME:  chargepoint-claims-agent
  REGISTRY:      us-central1-docker.pkg.dev
  REPO:          claims-agent

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint — runs on every push and every PR
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on app/
        run: ruff check app/ --ignore E501   # E501 = line-too-long (not critical)

  # ---------------------------------------------------------------------------
  # Job 2: Build & Deploy — only when lint passes AND push is to main
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GCP via Service Account JSON key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Allow Docker to push to Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Tag with commit SHA (immutable audit trail) and :latest
      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}
          docker build \
            --tag ${IMAGE}:${{ github.sha }} \
            --tag ${IMAGE}:latest \
            .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
          echo "IMAGE=${IMAGE}:${{ github.sha }}" >> $GITHUB_ENV

      # Deploy the SHA-tagged image to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.IMAGE }}
          env_vars: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --timeout=120

      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "✅ Live at: ${URL}/docs"
