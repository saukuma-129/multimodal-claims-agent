# =============================================================================
# CI Pipeline — ChargePoint Claims Agent
# =============================================================================
# Deployment is handled automatically by Vercel (connected via UI).
# This workflow only runs linting as a quality gate on every push and PR.
# Vercel will NOT deploy if this check fails when branch protection is enabled.
# =============================================================================

name: CI — Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on app/
        run: ruff check app/ --ignore E501
